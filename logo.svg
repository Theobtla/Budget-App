<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background circle -->
  <rect width="192" height="192" rx="45" fill="#667eea"/>

  <!-- Gradient for depth -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Update background with gradient -->
  <rect width="192" height="192" rx="45" fill="url(#grad1)"/>

  <!-- Euro symbol -->
  <text x="96" y="115" font-size="90" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">€</text>

  <!-- Small chart line at bottom -->
  <polyline points="45,145 65,135 85,140 105,125 125,130 145,115"
            stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <!-- Dots on chart -->
  <circle cx="105" cy="125" r="3" fill="white" opacity="0.9"/>
  <circle cx="125" cy="130" r="3" fill="white" opacity="0.9"/>
  <circle cx="145" cy="115" r="3" fill="white" opacity="0.9"/>
</svg>