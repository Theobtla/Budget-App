<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="45" fill="url(#grad)"/>

  <!-- Circles perfectly centered at 96,96 -->
  <circle cx="96" cy="96" r="55" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <circle cx="96" cy="96" r="50" fill="none" stroke="white" stroke-width="2.5" opacity="0.6"/>

  <!-- Euro symbol perfectly centered -->
  <g transform="translate(96, 96)">
    <text x="0" y="0" font-size="65" font-weight="bold" fill="white" font-family="Arial, sans-serif" text-anchor="middle" dominant-baseline="central">€</text>
  </g>
</svg>
