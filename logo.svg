<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="192" height="192" rx="45" fill="url(#grad)"/>

  <!-- Euro symbol -->
  <text x="65" y="110" font-size="75" font-weight="bold" fill="white" font-family="Arial, sans-serif">€</text>

  <!-- Ascending chart curve with style -->
  <path d="M 115,155 Q 130,135 145,130 T 175,110" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.95"/>

  <!-- Chart dots -->
  <circle cx="145" cy="130" r="2.5" fill="white"/>
  <circle cx="175" cy="110" r="2.5" fill="white"/>

  <!-- Decorative element -->
  <circle cx="55" cy="55" r="8" fill="white" opacity="0.3"/>
</svg>